# Runs release-please on every push to main. When a release PR is merged and a new
# version is tagged, builds the precompiled NIFs for every target, uploads them to the
# GitHub release, generates the checksum file from those artifacts, and publishes to Hex.
name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write
  attestations: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_KEY }}

      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ steps.app-token.outputs.token }}

  build_release:
    name: Build ${{ matrix.job.target }} (NIF ${{ matrix.nif }})
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ${{ matrix.job.os }}
    strategy:
      fail-fast: false
      matrix:
        nif: ["2.15"]
        job:
          - {target: x86_64-unknown-linux-gnu,   os: ubuntu-22.04}
          - {target: aarch64-unknown-linux-gnu,  os: ubuntu-22.04,   use-cross: true}
          - {target: x86_64-unknown-linux-musl,  os: ubuntu-22.04,   use-cross: true}
          - {target: aarch64-unknown-linux-musl, os: ubuntu-22.04,   use-cross: true}
          - {target: aarch64-apple-darwin,       os: macos-15}
          - {target: x86_64-pc-windows-msvc,     os: windows-2022}
    steps:
      - uses: actions/checkout@v4

      - uses: philss/rustler-precompiled-action@v1.1.5
        id: precompiled_job
        with:
          project-name: ex_cedar_native
          project-version: ${{ needs.release-please.outputs.version }}
          target: ${{ matrix.job.target }}
          nif-version: ${{ matrix.nif }}
          use-cross: ${{ matrix.job.use-cross }}
          project-dir: "native/ex_cedar_native"

      - name: Upload artifact to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: ${{ steps.precompiled_job.outputs.file-path }}

  publish_hex:
    name: Publish to Hex
    needs: [release-please, build_release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.20.1"
          otp-version: "29.0.1"

      - name: Install deps
        run: mix deps.get

      - name: Generate precompiled checksum file
        run: mix rustler_precompiled.download ExCedar.Native --all

      - name: Publish to Hex
        run: mix hex.publish --yes
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
